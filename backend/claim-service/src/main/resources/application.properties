spring.application.name=claim-service
server.port=8081

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:8889/claim_db?createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

### EUREKA ###
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

### GROQ ###
groq.api.token=${GROQ_API_TOKEN:your-groq-api-key-here}