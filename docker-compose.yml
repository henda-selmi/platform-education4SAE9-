version: '3.8'

services:

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - platform-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Eureka Server ─────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./backend/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API Gateway ───────────────────────────────────────────────────────────────
  gateway-service:
    build:
      context: ./backend/gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - platform-network

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: auth-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - platform-network

  # ── Claim Service ─────────────────────────────────────────────────────────────
  claim-service:
    build:
      context: ./backend/claim-service
    container_name: claim-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/claim_db?createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - platform-network

  # ── Retake Service ────────────────────────────────────────────────────────────
  retake-service:
    build:
      context: ./backend/retake-service
    container_name: retake-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/retake_db?createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - platform-network

  # ── ML Service (Python FastAPI) ───────────────────────────────────────────────
  ml-service:
    build:
      context: ./backend/ml-service
    container_name: ml-service
    ports:
      - "5001:5000"
    volumes:
      - ml-data:/app/data      # named volume — use: docker cp student-mat.csv ml-service:/app/data/
      - ml-models:/app/models  # persist trained models
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  mysql-data:
  ml-models:
  ml-data: