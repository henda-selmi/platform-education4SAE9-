<youpez-content-simple mainTitle="School Claims Management">
    <div class="notification-container mb-2"></div>
  
    <div fxLayout="row wrap">
      <div fxFlex="100%">
        
        <div fxLayout="row" fxLayoutAlign="space-between center" class="mb-4 mt-2">
          <div class="app-productive-heading-02">
            <span *ngIf="!isAdding">ALL CLAIMS</span>
            <span *ngIf="isAdding">{{ isEditing ? 'EDIT CLAIM' : 'CREATE NEW CLAIM' }}</span>
          </div>
          
          <button *ngIf="!isAdding" ibmButton="primary" size="sm" (click)="isAdding = true">
            New Claim +
          </button>
          <button *ngIf="isAdding" ibmButton="secondary" size="sm" (click)="resetForm()">
            Cancel / Back
          </button>
        </div>
  
        <div *ngIf="isAdding" class="bg-white p-4 shadow-sm mb-6 border-radius-4">
          <div class="bx--form-item mb-4">
            <label class="bx--label">Subject</label>
            <input [(ngModel)]="currentClaim.subject" type="text" class="bx--text-input">
          </div>
          <div class="bx--form-item mb-4">
            <label class="bx--label">Description</label>
            <textarea [(ngModel)]="currentClaim.description" class="bx--text-area" rows="3"></textarea>
          </div>
          <div class="bx--form-item mb-5">
            <label class="bx--label">Type</label>
            <div class="bx--select">
              <select [(ngModel)]="currentClaim.type" class="bx--select-input">
                <option *ngFor="let t of claimTypes" [value]="t">{{ t }}</option>
              </select>
              <youpez-ibm-icon iconName="chevronDown" class="bx--select__arrow" iconSize="16"></youpez-ibm-icon>
            </div>
          </div>
          <button ibmButton="primary" (click)="submitClaim()">
            {{ isEditing ? 'Update Claim' : 'Submit Claim' }}
          </button>
        </div>
  
        <ibm-table-container *ngIf="!isAdding">
          <ibm-table [model]="model" size="md" [showSelectionColumn]="false" [isDataGrid]="false"></ibm-table>
          
          <ibm-pagination 
            [model]="model" 
            (selectPage)="selectPage($event)">
          </ibm-pagination>
        </ibm-table-container>
  
      </div>
    </div>
  
    <ng-template #subjectTemplate let-data="data">
      <div fxLayout="column" fxLayoutAlign="start start">
        <a href="javascript:void(0)" (click)="viewDetail(data.id)" style="font-weight: 500; color: #0f62fe; text-decoration: none;">
          {{ data.subject }}
        </a>
        <div *ngIf="data.retakeRequest" class="mt-1">
          <span style="font-size: 10px; background: #e5fbe3; color: #198038; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; font-weight: 600;">
            <youpez-ibm-icon iconName="document" iconSize="10" class="mr-1"></youpez-ibm-icon>
            Retake Requested
          </span>
        </div>
      </div>
    </ng-template>
  
    <ng-template #actionTemplate let-data="data">
      <div fxLayout="row" fxLayoutAlign="start center">
        
        <button *ngIf="data.type === 'PEDAGOGICAL' && data.status === 'OPEN'" 
                class="bx--btn bx--btn--ghost bx--btn--sm" 
                (click)="onAuthorizeRetake(data.id)" 
                title="Admin: Authorize Retake">
          <youpez-ibm-icon iconName="checkmark" iconSize="16" style="fill: #f1c21b;"></youpez-ibm-icon>
        </button>
  
        <button *ngIf="data.status === 'RETAKE_AUTHORIZED' && !data.retakeRequest" 
                class="bx--btn bx--btn--ghost bx--btn--sm" 
                (click)="viewDetail(data.id)" 
                title="Student: Submit Retake Details">
          <youpez-ibm-icon iconName="document" iconSize="16" style="fill: #24a148;"></youpez-ibm-icon>
        </button>
  
        <button class="bx--btn bx--btn--ghost bx--btn--sm" (click)="viewDetail(data.id)" title="View Details">
          <youpez-ibm-icon iconName="view" iconSize="16"></youpez-ibm-icon>
        </button>
  
        <button *ngIf="data.status === 'OPEN'" class="bx--btn bx--btn--ghost bx--btn--sm" (click)="onEdit(data)" title="Edit Claim">
          <youpez-ibm-icon iconName="edit" iconSize="16" style="fill: #0f62fe;"></youpez-ibm-icon>
        </button>
  
        <button *ngIf="data.status === 'OPEN'" class="bx--btn bx--btn--ghost bx--btn--sm" (click)="onDelete(data.id)" title="Delete Claim">
          <youpez-ibm-icon iconName="trashCan" iconSize="16" style="fill: #da1e28;"></youpez-ibm-icon>
        </button>
  
      </div>
    </ng-template>
  
    <ng-template #statusTemplate let-data="data">
      <ibm-tag [type]="data === 'RESOLVED' ? 'green' : (data === 'RETAKE_AUTHORIZED' ? 'teal' : (data === 'OPEN' ? 'blue' : 'magenta'))">
        {{ data }}
      </ibm-tag>
    </ng-template>
  
  </youpez-content-simple>
